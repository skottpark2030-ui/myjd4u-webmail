<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Job Do for You · 메일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --ink:#0B1623; --ink-2:#0F1C2E; --ink-3:#13263C;
    --paper:#ECE6D8; --paper-dim:#9BA6B6;
    --brass:#C9A45C; --brass-bright:#E2C586;
    --line-warm:rgba(201,164,92,.20); --line-cool:rgba(255,255,255,.08);
    --display:'Space Grotesk','Pretendard',sans-serif;
    --sans:'Pretendard','Pretendard Variable',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--paper);font-family:var(--sans);height:100vh;overflow:hidden}
  button{font-family:var(--sans);cursor:pointer}
  .btn{font-size:13.5px;font-weight:600;color:var(--ink);background:var(--brass);border:none;border-radius:2px;padding:10px 18px;transition:background .2s}
  .btn:hover{background:var(--brass-bright)}
  .btn-ghost{background:transparent;color:var(--brass);border:1px solid var(--line-warm)}
  .btn-ghost:hover{background:rgba(201,164,92,.08)}

  #login{height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:380px}
  .login-card .mark{font-family:var(--display);font-weight:600;font-size:22px;margin-bottom:6px}
  .login-card .mark span{color:var(--brass)}
  .login-card .sub{color:var(--paper-dim);font-size:13.5px;margin-bottom:28px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--paper-dim);margin-bottom:6px;letter-spacing:.03em}
  .field input{width:100%;background:var(--ink-2);border:1px solid var(--line-cool);border-radius:3px;color:var(--paper);font-size:14.5px;padding:11px 13px}
  .field input:focus{outline:none;border-color:var(--brass)}
  #login .btn{width:100%;padding:12px;margin-top:6px}
  .hint{font-size:12px;color:var(--paper-dim);margin-top:16px;line-height:1.6}
  .err{color:#E2986A;font-size:13px;margin-top:12px;min-height:18px}

  #app{display:none;height:100vh;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:58px;border-bottom:1px solid var(--line-cool);flex-shrink:0}
  .topbar .mark{font-family:var(--display);font-weight:600;font-size:17px}
  .topbar .mark span{color:var(--brass)}
  .topbar .right{display:flex;align-items:center;gap:12px}
  .topbar .who{font-size:13px;color:var(--paper-dim)}
  .main{flex:1;display:flex;min-height:0}
  .list{width:340px;border-right:1px solid var(--line-cool);overflow-y:auto;flex-shrink:0}
  .list-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line-cool);position:sticky;top:0;background:var(--ink);z-index:2;gap:8px}
  .tabs{display:flex;gap:4px}
  .tab{background:none;border:none;color:var(--paper-dim);font-size:13.5px;font-weight:600;padding:6px 10px;border-radius:3px}
  .tab.active{color:var(--brass);background:rgba(201,164,92,.10)}
  .refresh{background:none;border:none;color:var(--paper-dim);font-size:12.5px}
  .refresh:hover{color:var(--brass)}
  .mailrow{padding:13px 16px;border-bottom:1px solid var(--line-cool);cursor:pointer;transition:background .15s}
  .mailrow:hover{background:var(--ink-2)}
  .mailrow.active{background:var(--ink-3)}
  .mailrow .r1{display:flex;justify-content:space-between;gap:10px;margin-bottom:4px}
  .mailrow .from{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mailrow.unread .from{color:var(--brass-bright)}
  .mailrow .date{font-size:11.5px;color:var(--paper-dim);white-space:nowrap;flex-shrink:0}
  .mailrow .subj{font-size:13px;color:var(--paper-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .reader{flex:1;overflow-y:auto;padding:28px 34px}
  .reader .empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--paper-dim);font-size:14px}
  .reader h1{font-size:20px;font-weight:700;margin-bottom:10px;letter-spacing:-.01em}
  .reader .meta{font-size:13px;color:var(--paper-dim);border-bottom:1px solid var(--line-cool);padding-bottom:16px;margin-bottom:20px;line-height:1.7}
  .reader .meta b{color:var(--paper);font-weight:600}
  .atts{margin:0 0 20px;display:flex;flex-wrap:wrap;gap:8px}
  .att{display:inline-flex;align-items:center;gap:8px;background:var(--ink-2);border:1px solid var(--line-warm);border-radius:4px;padding:8px 12px;font-size:13px;color:var(--paper);text-decoration:none}
  .att:hover{background:var(--ink-3)}
  .att .ic{color:var(--brass)}
  .att .sz{color:var(--paper-dim);font-size:11.5px}
  .reader .body{font-size:14.5px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
  .reader .body.html{white-space:normal}
  .reader .body.html *{max-width:100%}
  .reader .actions{margin-bottom:20px}
  .spin{color:var(--paper-dim);font-size:14px;padding:18px 16px}

  .overlay{position:fixed;inset:0;background:rgba(6,12,20,.7);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
  .overlay.open{display:flex}
  .compose{background:var(--ink-2);border:1px solid var(--line-warm);border-radius:5px;width:100%;max-width:560px;padding:26px 28px}
  .compose h3{font-size:18px;font-weight:700;margin-bottom:18px}
  .compose .field input,.compose .field textarea{width:100%;background:var(--ink);border:1px solid var(--line-cool);border-radius:3px;color:var(--paper);font-family:var(--sans);font-size:14px;padding:10px 12px}
  .compose textarea{min-height:160px;resize:vertical;line-height:1.6}
  .attbar{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap}
  .attbar label{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--brass);border:1px solid var(--line-warm);border-radius:3px;padding:8px 12px;cursor:pointer}
  .attbar label:hover{background:rgba(201,164,92,.08)}
  .attlist{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .attchip{display:inline-flex;align-items:center;gap:7px;background:var(--ink);border:1px solid var(--line-cool);border-radius:3px;padding:5px 9px;font-size:12.5px;color:var(--paper-dim)}
  .attchip button{background:none;border:none;color:var(--paper-dim);cursor:pointer;font-size:14px;line-height:1}
  .compose .row{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink-3);border:1px solid var(--line-warm);color:var(--paper);padding:12px 20px;border-radius:4px;font-size:13.5px;display:none;z-index:60}
  .toast.show{display:block}

  @media(max-width:760px){
    .list{width:100%;border-right:0}
    .reader{display:none}
    .main.reading .list{display:none}
    .main.reading .reader{display:block;flex:1}
    .back{display:inline-block;color:var(--brass);font-size:13px;background:none;border:none;margin-bottom:14px}
  }
  @media(min-width:761px){ .back{display:none} }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="mark">My Job Do for You <span>메일</span></div>
    <div class="sub">myjd4u.com 메일함에 로그인</div>
    <div class="field"><label for="email">이메일</label><input id="email" type="email" autocomplete="username" placeholder="skott.park@myjd4u.com"></div>
    <div class="field"><label for="pw">앱 전용 비밀번호</label><input id="pw" type="password" autocomplete="current-password" placeholder="Zoho 앱 비밀번호"></div>
    <button class="btn" id="loginBtn">로그인</button>
    <div class="err" id="loginErr"></div>
    <div class="hint">일반 Zoho 비밀번호가 아니라, Zoho에서 발급한 <b>앱 전용 비밀번호</b>를 넣으세요. (Mail Lite 이상 + IMAP 사용)</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="mark">My Job Do for You <span>메일</span></div>
    <div class="right">
      <span class="who" id="who"></span>
      <button class="btn" id="composeBtn">쓰기</button>
      <button class="btn-ghost btn" id="logoutBtn">로그아웃</button>
    </div>
  </div>
  <div class="main" id="mainArea">
    <div class="list" id="list">
      <div class="list-head">
        <div class="tabs">
          <button class="tab active" data-box="INBOX">받은편지함</button>
          <button class="tab" data-box="SENT">보낸편지함</button>
        </div>
        <button class="refresh" id="refreshBtn">새로고침</button>
      </div>
      <div id="rows"><div class="spin">불러오는 중…</div></div>
    </div>
    <div class="reader" id="reader"><div class="empty">왼쪽에서 메일을 선택하세요.</div></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="compose">
    <h3>새 메일</h3>
    <div class="field"><input id="c-to" type="text" placeholder="받는 사람 (이메일)"></div>
    <div class="field"><input id="c-subj" type="text" placeholder="제목"></div>
    <div class="field"><textarea id="c-body" placeholder="내용"></textarea></div>
    <div class="attbar">
      <label>＋ 첨부<input id="c-file" type="file" multiple style="display:none"></label>
    </div>
    <div class="attlist" id="c-attlist"></div>
    <div class="row">
      <button class="btn-ghost btn" id="c-cancel">취소</button>
      <button class="btn" id="c-send">보내기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtDate(d){ if(!d) return ''; const dt=new Date(d), now=new Date();
  return dt.toDateString()===now.toDateString()
    ? dt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})
    : dt.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}); }
function fmtSize(n){ if(!n&&n!==0) return ''; if(n<1024) return n+'B'; if(n<1048576) return (n/1024).toFixed(0)+'KB'; return (n/1048576).toFixed(1)+'MB'; }

let currentBox='INBOX', messages=[];

async function doLogin(){
  const email=$('#email').value.trim(), password=$('#pw').value;
  $('#loginErr').textContent='';
  if(!email||!password){ $('#loginErr').textContent='이메일과 앱 비밀번호를 입력하세요.'; return; }
  $('#loginBtn').textContent='접속 중…'; $('#loginBtn').disabled=true;
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error||'로그인 실패');
    enterApp(d.email);
  }catch(e){ $('#loginErr').textContent=e.message; }
  finally{ $('#loginBtn').textContent='로그인'; $('#loginBtn').disabled=false; }
}
$('#loginBtn').addEventListener('click',doLogin);
$('#pw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

function enterApp(email){ $('#login').style.display='none'; $('#app').style.display='flex'; $('#who').textContent=email; loadMessages('INBOX'); }

async function loadMessages(box){
  currentBox=box;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.box===box));
  $('#rows').innerHTML='<div class="spin">불러오는 중…</div>';
  $('#reader').innerHTML='<div class="empty">왼쪽에서 메일을 선택하세요.</div>';
  try{
    const r=await fetch('/api/messages?box='+box);
    if(r.status===401){ location.reload(); return; }
    const d=await r.json(); if(!r.ok) throw new Error(d.error);
    messages=d.messages||[]; renderList();
  }catch(e){ $('#rows').innerHTML='<div class="spin">오류: '+esc(e.message)+'</div>'; }
}
function renderList(){
  if(!messages.length){ $('#rows').innerHTML='<div class="spin">메일이 없습니다.</div>'; return; }
  const sent = currentBox==='SENT';
  $('#rows').innerHTML = messages.map(m=>{
    const who = sent ? ('→ '+(m.toName||'')) : (m.fromName||'');
    return `<div class="mailrow ${m.seen?'':'unread'}" data-uid="${m.uid}">
      <div class="r1"><span class="from">${esc(who)}</span><span class="date">${fmtDate(m.date)}</span></div>
      <div class="subj">${esc(m.subject)}</div></div>`;
  }).join('');
  document.querySelectorAll('.mailrow').forEach(el=>el.addEventListener('click',()=>openMessage(el.dataset.uid,el)));
}

async function openMessage(uid,el){
  document.querySelectorAll('.mailrow').forEach(r=>r.classList.remove('active'));
  if(el){ el.classList.add('active'); el.classList.remove('unread'); }
  $('#mainArea').classList.add('reading');
  $('#reader').innerHTML='<div class="spin">불러오는 중…</div>';
  try{
    const r=await fetch('/api/message/'+encodeURIComponent(uid)+'?box='+currentBox);
    const d=await r.json(); if(!r.ok) throw new Error(d.error);
    let attsHtml='';
    if(d.attachments && d.attachments.length){
      attsHtml='<div class="atts">'+d.attachments.map(a=>
        `<a class="att" href="/api/attachment/${encodeURIComponent(uid)}?box=${currentBox}&idx=${a.idx}">
           <span class="ic">⤓</span>${esc(a.filename)} <span class="sz">${fmtSize(a.size)}</span></a>`).join('')+'</div>';
    }
    const body = d.html ? '<div class="body html">'+d.html+'</div>' : '<div class="body">'+esc(d.text)+'</div>';
    $('#reader').innerHTML =
      '<button class="back" id="backBtn">← 목록</button>'+
      '<div class="actions"><button class="btn-ghost btn" id="replyBtn">답장</button></div>'+
      '<h1>'+esc(d.subject)+'</h1>'+
      '<div class="meta"><b>'+esc(d.from)+'</b><br>받는사람: '+esc(d.to)+'<br>'+(d.date?new Date(d.date).toLocaleString('ko-KR'):'')+'</div>'+
      attsHtml + body;
    const back=$('#backBtn'); if(back) back.addEventListener('click',()=>$('#mainArea').classList.remove('reading'));
    $('#replyBtn').addEventListener('click',()=>{
      const addr=(d.from.match(/<(.+?)>/)||[null,d.from])[1];
      openCompose(addr, d.subject.startsWith('Re:')?d.subject:'Re: '+d.subject);
    });
  }catch(e){ $('#reader').innerHTML='<div class="spin">오류: '+esc(e.message)+'</div>'; }
}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>loadMessages(t.dataset.box)));
$('#refreshBtn').addEventListener('click',()=>loadMessages(currentBox));
$('#logoutBtn').addEventListener('click',async()=>{ await fetch('/api/logout',{method:'POST'}); location.reload(); });

// ---- compose with attachments ----
let pendingFiles=[];
function renderAttList(){
  $('#c-attlist').innerHTML = pendingFiles.map((f,i)=>
    `<span class="attchip">${esc(f.name)} <button data-i="${i}">×</button></span>`).join('');
  document.querySelectorAll('#c-attlist button').forEach(b=>b.addEventListener('click',()=>{
    pendingFiles.splice(parseInt(b.dataset.i,10),1); renderAttList();
  }));
}
function openCompose(to,subject){
  $('#c-to').value=to||''; $('#c-subj').value=subject||''; $('#c-body').value='';
  pendingFiles=[]; renderAttList(); $('#c-file').value='';
  $('#overlay').classList.add('open'); $('#c-to').focus();
}
$('#composeBtn').addEventListener('click',()=>openCompose('',''));
$('#c-cancel').addEventListener('click',()=>$('#overlay').classList.remove('open'));
$('#overlay').addEventListener('click',e=>{ if(e.target===$('#overlay')) $('#overlay').classList.remove('open'); });
$('#c-file').addEventListener('change',e=>{ for(const f of e.target.files) pendingFiles.push(f); renderAttList(); });

function readFile(f){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res({filename:f.name, contentType:f.type||'application/octet-stream', dataBase64:String(r.result).split(',')[1]});
  r.onerror=rej; r.readAsDataURL(f); }); }

$('#c-send').addEventListener('click',async()=>{
  const to=$('#c-to').value.trim();
  if(!to){ toast('받는 사람을 입력하세요.'); return; }
  $('#c-send').textContent='보내는 중…'; $('#c-send').disabled=true;
  try{
    const attachments = await Promise.all(pendingFiles.map(readFile));
    const r=await fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to,subject:$('#c-subj').value,text:$('#c-body').value,attachments})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error);
    $('#overlay').classList.remove('open'); toast('메일을 보냈습니다.');
  }catch(e){ toast(e.message); }
  finally{ $('#c-send').textContent='보내기'; $('#c-send').disabled=false; }
});

fetch('/api/me').then(r=>r.ok?r.json():Promise.reject()).then(d=>enterApp(d.email)).catch(()=>{});
</script>
</body>
</html>
