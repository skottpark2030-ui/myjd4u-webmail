<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내부 자료실 · My Job Do for You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --ink:#0B1623; --ink-2:#0F1C2E; --ink-3:#13263C;
    --paper:#ECE6D8; --paper-dim:#9BA6B6;
    --brass:#C9A45C; --brass-bright:#E2C586;
    --line-warm:rgba(201,164,92,.20); --line-cool:rgba(255,255,255,.08);
    --exec:#C9A45C; --team:#6FB3A6; --common:#9BA6B6;
    --display:'Space Grotesk','Pretendard',sans-serif;
    --sans:'Pretendard','Pretendard Variable',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--paper);font-family:var(--sans);min-height:100vh}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(120% 80% at 80% -10%, rgba(201,164,92,.10), transparent 60%)}
  a{color:inherit;text-decoration:none}
  button{font-family:var(--sans);cursor:pointer}
  .wrap{max-width:1040px;margin:0 auto;padding:0 32px;position:relative;z-index:1}
  header{border-bottom:1px solid var(--line-cool);position:sticky;top:0;background:rgba(11,22,35,.78);backdrop-filter:blur(12px);z-index:10}
  .nav{display:flex;align-items:center;justify-content:space-between;height:70px}
  .mark{font-family:var(--display);font-weight:600;font-size:18px;color:var(--paper);display:flex;align-items:center;gap:10px}
  .mark .logo{height:26px;width:auto;display:block}
  .mark span{color:var(--brass)}
  .nav .links a{color:var(--paper-dim);font-size:14px;margin-left:24px}
  .nav .links a:hover{color:var(--brass)}

  .hero{padding:66px 0 26px}
  .badge{display:inline-flex;align-items:center;gap:9px;font-family:var(--display);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);margin-bottom:20px}
  .badge::before{content:"🔒";width:auto;height:auto;font-size:12px}
  h1{font-weight:800;font-size:clamp(28px,4vw,42px);letter-spacing:-.025em}
  .lead{margin-top:16px;color:var(--paper-dim);font-size:16px;max-width:56ch;line-height:1.7}

  .tools{display:flex;gap:12px;align-items:center;margin:30px 0 6px;flex-wrap:wrap}
  .search{flex:1;min-width:220px;background:var(--ink-2);border:1px solid var(--line-cool);border-radius:4px;color:var(--paper);font-family:var(--sans);font-size:14px;padding:11px 14px}
  .search::placeholder{color:var(--paper-dim)}
  .search:focus{outline:none;border-color:var(--brass)}
  .count{font-size:13px;color:var(--paper-dim)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 0}
  .chip{font-family:var(--display);font-size:12px;letter-spacing:.06em;color:var(--paper-dim);
    background:var(--ink-2);border:1px solid var(--line-cool);border-radius:3px;padding:7px 14px;cursor:pointer;transition:.18s}
  .chip:hover{color:var(--paper);border-color:var(--line-warm)}
  .chip[aria-pressed="true"]{color:var(--ink);background:var(--brass);border-color:var(--brass)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:24px 0 60px}
  .card{background:var(--ink-2);border:1px solid var(--line-cool);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,background .2s,transform .2s}
  .card:hover{border-color:var(--line-warm);background:var(--ink-3);transform:translateY(-3px)}
  .thumb{height:132px;position:relative;border-bottom:1px solid var(--line-cool);background:linear-gradient(160deg,var(--ink-3),var(--ink-2))}
  .thumb svg{width:100%;height:100%}
  .lockbadge{position:absolute;top:12px;left:12px;display:inline-flex;align-items:center;gap:5px;font-family:var(--display);font-size:11px;letter-spacing:.06em;
    padding:4px 9px;border-radius:3px;background:rgba(11,22,35,.72);border:1px solid var(--line-cool)}
  .lockbadge.exec{color:var(--exec);border-color:var(--line-warm)}
  .lockbadge.team{color:var(--team);border-color:rgba(111,179,166,.3)}
  .lockbadge.common{color:var(--common)}
  .card-body{padding:20px 22px 18px;display:flex;flex-direction:column;flex:1}
  .card h3{font-size:17px;font-weight:700;line-height:1.4;letter-spacing:-.01em}
  .card .desc{margin-top:9px;font-size:13.5px;color:var(--paper-dim);line-height:1.6;flex:1}
  .who{align-self:flex-start;display:inline-flex;align-items:center;gap:5px;font-size:12px;margin-top:12px;
    padding:3px 9px;border-radius:3px}
  .who.exec{color:var(--exec);background:rgba(201,164,92,.10)}
  .who.team{color:var(--team);background:rgba(111,179,166,.10)}
  .who.common{color:var(--common);background:rgba(155,166,182,.10)}
  .card .foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
  .card .meta{font-size:12px;color:var(--paper-dim)}
  .card a.act{font-size:13px;font-weight:600;color:var(--ink);background:var(--brass);border-radius:3px;padding:7px 15px;text-decoration:none;transition:background .2s}
  .card a.act:hover{background:var(--brass-bright)}
  .empty{grid-column:1/-1;text-align:center;color:var(--paper-dim);padding:50px;border:1px dashed var(--line-warm);border-radius:6px;font-size:14px}
  footer{border-top:1px solid var(--line-cool);padding:26px 0;font-size:13px;color:var(--paper-dim)}
  @media(max-width:720px){ .wrap{padding:0 22px} }
</style>
</head>
<body>
<header>
  <div class="wrap nav">
    <a href="/" class="mark"><img src="/assets/logo-mark.png" alt="" class="logo">My Job Do for You <span>· 내부</span></a>
    <div class="links">
      <a href="/">홈</a>
      <a href="/lib/">공개 자료실</a>
      <a href="https://mail.myjd4u.com" target="_blank" rel="noopener">메일</a>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="hero">
    <div class="badge">Internal · 내부 전용</div>
    <h1>내부 자료실</h1>
    <p class="lead">로그인한 사용자만 볼 수 있는 내부 자료입니다. 내부용 HTML 대시보드, 앱 파일, 보고 자료 등을 권한에 따라 정리합니다.</p>
    <div class="tools">
      <input class="search" id="search" type="text" placeholder="자료 검색…">
      <span class="count" id="count"></span>
    </div>
    <div class="chips" id="chips">
      <button class="chip" data-f="all" aria-pressed="true">전체</button>
      <button class="chip" data-f="exec" aria-pressed="false">임원 전용</button>
      <button class="chip" data-f="team" aria-pressed="false">팀 자료</button>
      <button class="chip" data-f="common" aria-pressed="false">공통</button>
    </div>
  </section>
  <div class="grid" id="grid"></div>
</main>

<footer><div class="wrap">© 2026 · My Job Do for You — 내부 영역</div></footer>

<script>
/* ============================================================
   내부 자료 목록 — 여기만 편집하면 됩니다.
   파일 추가하는 법:
   1) 파일을 internal/files/ 폴더에 넣습니다 (예: internal/files/통합실적.html)
   2) 아래 RESOURCES 배열에 한 줄 추가합니다
   3) 사이트를 다시 배포합니다
   - kind : "html" = 새 탭에서 열기 / "file" = 다운로드
   - tier : "exec"(임원 전용) / "team"(팀 자료) / "common"(공통)  ← 권한 표시·필터 (생략 가능)
   - who  : 담당/접근 대상 라벨 (예: "분석팀")  ← 생략 가능
   - thumb: "dash" / "sheet" / "doc" / "archive" / "slides"  ← 썸네일 (생략 시 kind로 자동)
   ============================================================ */
const RESOURCES = [
  // ↓↓↓ 아래는 디자인 미리보기용 예시입니다. 모두 실제 sample.html을 가리켜 404는 안 납니다.
  { title:"2026 사업계획 (최종)", file:"files/sample.html", kind:"file", tier:"exec", who:"임원", thumb:"slides",
    desc:"올해 신사업 추진 방향과 목표를 담은 확정본. 외부 공유 금지.", meta:"2026-06-20" },
  { title:"고객사 계약서 모음", file:"files/sample.html", kind:"file", tier:"exec", who:"임원", thumb:"archive",
    desc:"진행 중인 화주·파트너 계약서 일괄 보관.", meta:"2026-06-19" },
  { title:"실적분석 대시보드", file:"files/sample.html", kind:"html", tier:"team", who:"분석팀", thumb:"dash",
    desc:"지역·KPI별 월간 실적을 집계한 분석팀 전용 대시보드.", meta:"2026-06-18" },
  { title:"급여대장 (6월)", file:"files/sample.html", kind:"file", tier:"team", who:"인사팀", thumb:"sheet",
    desc:"월별 급여 산정 내역. 인사팀 권한으로만 열람.", meta:"2026-06-15" },
  { title:"조직도", file:"files/sample.html", kind:"file", tier:"common", who:"전체 구성원", thumb:"doc",
    desc:"현재 조직 구성과 담당 영역.", meta:"2026-06-10" },
  { title:"월간 보고 템플릿", file:"files/sample.html", kind:"file", tier:"common", who:"전체 구성원", thumb:"sheet",
    desc:"30분 만에 끝내는 실적 보고용 집계 양식.", meta:"2026-06-06" },
];

const TIER_LABEL = { exec:"임원 전용", team:"팀 자료", common:"공통" };
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

const T = {
  dash:`<svg viewBox="0 0 300 132" preserveAspectRatio="none"><g fill="#C9A45C" opacity=".85">
    <rect x="34" y="74" width="26" height="48" rx="2"/><rect x="78" y="52" width="26" height="70" rx="2"/>
    <rect x="122" y="34" width="26" height="88" rx="2"/><rect x="166" y="60" width="26" height="62" rx="2"/>
    <rect x="210" y="42" width="26" height="80" rx="2"/><rect x="254" y="66" width="14" height="56" rx="2"/></g>
    <line x1="24" y1="122" x2="280" y2="122" stroke="rgba(201,164,92,.3)" stroke-width="1.5"/></svg>`,
  sheet:`<svg viewBox="0 0 300 132"><g transform="translate(150,66)">
    <rect x="-46" y="-34" width="92" height="68" rx="5" fill="none" stroke="#9BA6B6" stroke-width="2" opacity=".5"/>
    <rect x="-46" y="-34" width="92" height="16" fill="#C9A45C" opacity=".7"/>
    <line x1="-16" y1="-18" x2="-16" y2="34" stroke="rgba(155,166,182,.4)" stroke-width="2"/>
    <line x1="14" y1="-18" x2="14" y2="34" stroke="rgba(155,166,182,.4)" stroke-width="2"/>
    <line x1="-46" y1="0" x2="46" y2="0" stroke="rgba(155,166,182,.4)" stroke-width="2"/>
    <line x1="-46" y1="17" x2="46" y2="17" stroke="rgba(155,166,182,.4)" stroke-width="2"/></g></svg>`,
  doc:`<svg viewBox="0 0 300 132"><g transform="translate(150,66)">
    <rect x="-32" y="-40" width="64" height="80" rx="5" fill="none" stroke="#ECE6D8" stroke-width="2" opacity=".5"/>
    <line x1="-18" y1="-22" x2="18" y2="-22" stroke="#9BA6B6" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="-6" x2="18" y2="-6" stroke="#9BA6B6" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="10" x2="6" y2="10" stroke="#9BA6B6" stroke-width="3" stroke-linecap="round"/></g></svg>`,
  archive:`<svg viewBox="0 0 300 132"><g transform="translate(150,66)">
    <rect x="-40" y="-26" width="80" height="56" rx="6" fill="#C9A45C" opacity=".22" stroke="#C9A45C" stroke-width="1.5"/>
    <rect x="-40" y="-26" width="80" height="17" rx="6" fill="#C9A45C" opacity=".5"/>
    <rect x="-8" y="-3" width="16" height="14" rx="2" fill="none" stroke="#ECE6D8" stroke-width="1.5" opacity=".6"/></g></svg>`,
  slides:`<svg viewBox="0 0 300 132"><g transform="translate(150,66)">
    <rect x="-56" y="-32" width="112" height="64" rx="5" fill="none" stroke="#9BA6B6" stroke-width="2" opacity=".5"/>
    <rect x="-44" y="-20" width="42" height="40" rx="3" fill="#C9A45C" opacity=".7"/>
    <line x1="10" y1="-16" x2="44" y2="-16" stroke="#9BA6B6" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="-2" x2="44" y2="-2" stroke="#9BA6B6" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="12" x2="32" y2="12" stroke="#9BA6B6" stroke-width="4" stroke-linecap="round"/></g></svg>`,
};
function thumbFor(r){ return T[r.thumb] || (r.kind==='html' ? T.dash : T.doc); }

function render(list){
  const grid = document.getElementById('grid');
  if(!list.length){ grid.innerHTML = '<div class="empty">등록된 자료가 없습니다.</div>'; return; }
  grid.innerHTML = list.map(r=>{
    const open = r.kind === 'html';
    const act = open
      ? `<a class="act" href="${esc(r.file)}" target="_blank" rel="noopener">열기</a>`
      : `<a class="act" href="${esc(r.file)}" download>다운로드</a>`;
    const tier = r.tier || 'common';
    const lockLabel = TIER_LABEL[tier] || '공통';
    const whoHtml = r.who ? `<span class="who ${tier}">👤 ${esc(r.who)}</span>` : '';
    return `<div class="card">
      <div class="thumb"><span class="lockbadge ${tier}">🔒 ${lockLabel}</span>${thumbFor(r)}</div>
      <div class="card-body">
        <h3>${esc(r.title)}</h3>
        <p class="desc">${esc(r.desc||'')}</p>
        ${whoHtml}
        <div class="foot"><span class="meta">${esc(r.meta||'')}</span>${act}</div>
      </div>
    </div>`;
  }).join('');
}

let filter = 'all';
function update(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const list = RESOURCES.filter(r =>
    (filter==='all' || (r.tier||'common')===filter) &&
    (!q || (r.title+r.desc+(r.who||'')).toLowerCase().includes(q))
  );
  document.getElementById('count').textContent = `${list.length}건`;
  render(list);
}
document.getElementById('search').addEventListener('input', update);
document.getElementById('chips').addEventListener('click', e=>{
  const c = e.target.closest('.chip'); if(!c) return;
  filter = c.dataset.f;
  document.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed', String(x===c)));
  update();
});
update();
</script>
</body>
</html>
